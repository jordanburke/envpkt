name: Action Smoke Test

# End-to-end check of the composite action (action.yml).
# Fully self-contained: generates a throwaway age keypair, seals a test value,
# runs the action, and asserts the secret was decrypted, masked, and propagated
# to a later step via $GITHUB_ENV. No repository secrets required.
#
# Two jobs:
#   smoke           — runs the LOCAL action (uses: ./), gated to action/workflow changes.
#   smoke-published — runs the PUBLISHED ref (uses: jordanburke/envpkt@v0), the exact path
#                     consumers use, on the weekly cron + manual dispatch.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "envpkt version the action should run via npx"
        required: false
        default: "latest"
  # Gate changes to the action itself / this workflow.
  pull_request:
    paths:
      - "action.yml"
      - ".github/workflows/action-smoke.yml"
  push:
    branches: [main]
    paths:
      - "action.yml"
      - ".github/workflows/action-smoke.yml"
  # Catch drift in the published CLI that the action runs (no commit required).
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Sealed packets are decrypted with the `age` CLI, which is not preinstalled.
      - name: Install age
        run: sudo apt-get update && sudo apt-get install -y age

      - name: Create an ephemeral sealed config
        shell: bash
        run: |
          set -euo pipefail
          keys="$(age-keygen 2>/dev/null)"
          recipient="$(echo "$keys" | sed -n 's/# public key: //p')"
          secret="$(echo "$keys" | grep '^AGE-SECRET-KEY-')"
          ciphertext="$(printf 'smoke-value' | age -r "$recipient" -a)"

          cfg="$RUNNER_TEMP/envpkt.toml"
          {
            echo 'version = 1'
            echo '[namespace]'
            echo 'prefix = "CIV"'
            echo '[secret.SMOKE_KEY]'
            echo 'service = "smoke"'
            printf 'encrypted_value = """\n%s"""\n' "$ciphertext"
          } > "$cfg"

          # Throwaway key — mask it and hand it to the action via the job env.
          echo "::add-mask::$secret"
          {
            echo "ENVPKT_SMOKE_CONFIG=$cfg"
            echo "ENVPKT_AGE_KEY=$secret"
          } >> "$GITHUB_ENV"

      - name: Run the envpkt action
        uses: ./
        with:
          config: ${{ env.ENVPKT_SMOKE_CONFIG }}
          version: ${{ inputs.version || 'latest' }}
          strict: "true"
        env:
          ENVPKT_AGE_KEY: ${{ env.ENVPKT_AGE_KEY }}

      - name: Verify injection into $GITHUB_ENV
        shell: bash
        run: |
          set -euo pipefail
          if [ "${CIV__SMOKE_KEY:-}" != "smoke-value" ]; then
            echo "FAIL: CIV__SMOKE_KEY was not injected (got: '${CIV__SMOKE_KEY:-<unset>}')"
            exit 1
          fi
          # The plain/logical name must NOT be set — only the namespaced wire name.
          if [ -n "${SMOKE_KEY:-}" ]; then
            echo "FAIL: unexpected logical name SMOKE_KEY is set"
            exit 1
          fi
          echo "OK: sealed secret resolved (inline ENVPKT_AGE_KEY), masked, and injected as CIV__SMOKE_KEY"

  # Same assertions, but against the PUBLISHED action ref (uses: jordanburke/envpkt@v0) —
  # the exact path consumers rely on. No checkout: like a real consumer, it pulls the action
  # from the tag. Gated to the weekly cron + manual dispatch (a PR to action.yml can't change
  # the already-tagged @v0, and running it per-push adds no signal).
  smoke-published:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      # Sealed packets are decrypted with the `age` CLI, which is not preinstalled.
      - name: Install age
        run: sudo apt-get update && sudo apt-get install -y age

      - name: Create an ephemeral sealed config
        shell: bash
        run: |
          set -euo pipefail
          keys="$(age-keygen 2>/dev/null)"
          recipient="$(echo "$keys" | sed -n 's/# public key: //p')"
          secret="$(echo "$keys" | grep '^AGE-SECRET-KEY-')"
          ciphertext="$(printf 'smoke-value' | age -r "$recipient" -a)"

          cfg="$RUNNER_TEMP/envpkt.toml"
          {
            echo 'version = 1'
            echo '[namespace]'
            echo 'prefix = "CIV"'
            echo '[secret.SMOKE_KEY]'
            echo 'service = "smoke"'
            printf 'encrypted_value = """\n%s"""\n' "$ciphertext"
          } > "$cfg"

          # Throwaway key — mask it and hand it to the action via the job env.
          echo "::add-mask::$secret"
          {
            echo "ENVPKT_SMOKE_CONFIG=$cfg"
            echo "ENVPKT_AGE_KEY=$secret"
          } >> "$GITHUB_ENV"

      - name: Run the PUBLISHED envpkt action (@v0)
        uses: jordanburke/envpkt@v0
        with:
          config: ${{ env.ENVPKT_SMOKE_CONFIG }}
          version: ${{ inputs.version || 'latest' }}
          strict: "true"
        env:
          ENVPKT_AGE_KEY: ${{ env.ENVPKT_AGE_KEY }}

      - name: Verify injection into $GITHUB_ENV
        shell: bash
        run: |
          set -euo pipefail
          if [ "${CIV__SMOKE_KEY:-}" != "smoke-value" ]; then
            echo "FAIL: CIV__SMOKE_KEY was not injected (got: '${CIV__SMOKE_KEY:-<unset>}')"
            exit 1
          fi
          # The plain/logical name must NOT be set — only the namespaced wire name.
          if [ -n "${SMOKE_KEY:-}" ]; then
            echo "FAIL: unexpected logical name SMOKE_KEY is set"
            exit 1
          fi
          echo "OK: published action @v0 resolved sealed secret, masked, and injected as CIV__SMOKE_KEY"
