name: Publish to NPM

on:
  push:
    tags:
      # Full semver tags only (e.g. v0.12.0). Moving/major tags like `v1` or `v0`
      # (used to reference the GitHub Action) intentionally do NOT trigger a publish.
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # OIDC for npm trusted publishing

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm validate

      - name: Verify package contents
        run: |
          echo "Files to be published:"
          npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Keep the moving major action tag (e.g. v0) pointed at the latest release,
      # so `uses: jordanburke/envpkt@v0` always resolves to the newest 0.x.
      # v0.13.5 -> v0. (A bare major tag never triggers this workflow; see the
      # full-semver trigger above.) Promote to v1 when envpkt reaches 1.0.0.
      - name: Move major action tag
        run: |
          MAJOR="${GITHUB_REF_NAME%%.*}"
          git tag -f "$MAJOR" "$GITHUB_SHA"
          git push -f origin "refs/tags/$MAJOR"
