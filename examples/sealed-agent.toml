#:schema https://raw.githubusercontent.com/jordanburke/envpkt/main/schemas/envpkt.schema.json

# Sealed agent — secrets encrypted inline with age, safe to commit to git.
#
# Setup:
#   1. Generate a keypair:  age-keygen -o identity.txt
#   2. Copy the public key into `recipient` below
#   3. Add identity.txt to .gitignore
#   4. Run: envpkt seal
#
# At runtime, `envpkt exec -- node app.js` (or boot() in code) will
# decrypt sealed values using the identity file.

version = 1

[identity]
name = "inference-agent"
consumer = "agent"
description = "LLM inference agent with sealed API keys"
capabilities = ["chat:completions", "embeddings"]
expires = "2027-06-01"
services = ["openai", "anthropic"]
recipient = "age1reznz3x4gmec8quu4ttmfxy7v5w5pdjs3kukqz9vej5uvkwd23fs5a39n8"
identity = "sealed-identity.txt"

[lifecycle]
stale_warning_days = 90
require_expiration = true
require_service = true

# --- Environment Defaults (non-secret, safe to commit) ---

[env.MODEL_TEMPERATURE]
value = "0.7"
purpose = "Default inference temperature"

[env.MAX_TOKENS]
value = "4096"
purpose = "Default max output tokens"

# --- Secrets ---
# After running `envpkt seal`, each secret will get an `encrypted_value`
# field containing age-armored ciphertext. That ciphertext is safe to commit.

[secret.OPENAI_API_KEY]
service = "openai"
purpose = "GPT-4 chat completions and embeddings"
capabilities = ["chat:completions", "embeddings:create"]
created = "2026-02-01"
expires = "2027-02-01"
rotation_url = "https://platform.openai.com/api-keys"
source = "fnox"
rate_limit = "500/min"

